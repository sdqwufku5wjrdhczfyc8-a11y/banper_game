<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>砂漠のオフロード・サバイバル</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* 空の色 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        
        /* UI情報のスタイル */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
        }
        .info {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .highlight {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        /* ゲームオーバー画面 */
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            z-index: 30;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            color: #ff5500;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ff0000;
        }
        #final-score {
            font-size: 32px;
            margin-bottom: 10px;
        }
        button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff8800, #ff4400);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 136, 0, 0.5);
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.95);
        }

        /* モバイル向けコントロールUI */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 20;
        }
        .control-group {
            display: flex;
            gap: 15px;
        }
        .btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 30px;
            user-select: none;
            -webkit-user-select: none;
            backdrop-filter: blur(5px);
        }
        .btn:active, .btn.active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.95);
        }
        #btn-thrust {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            background: rgba(255, 136, 0, 0.3);
            border-color: #ff8800;
            font-size: 20px;
            font-weight: bold;
        }
        #btn-thrust:active, #btn-thrust.active {
            background: rgba(255, 136, 0, 0.6);
        }
        
        #level-up {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff3300;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 20px #ffaa00;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 15;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- UI表示 -->
    <div id="ui-layer">
        <div class="info" id="dist-display">走破距離: 0 m</div>
        <div class="info" id="life-display">ライフ: 🔧🔧🔧</div>
        <div class="info" id="shield-display" style="color: #aaa;">バンパーガード: なし</div>
    </div>

    <!-- レベルアップ通知 -->
    <div id="level-up">ZONE クリア！ルート悪化！</div>

    <!-- コントローラー -->
    <div id="controls">
        <div class="control-group">
            <div class="btn" id="btn-left">◀</div>
            <div class="btn" id="btn-right">▶</div>
        </div>
        <div class="btn" id="btn-thrust">💨<br>ジャンプ</div>
    </div>

    <!-- ゲームオーバー画面 -->
    <div id="game-over-screen">
        <h1>CRASHED</h1>
        <div id="final-score">走破距離: 0 m</div>
        <button onclick="location.reload()">再スタート</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // === グローバル変数 ===
        let scene, camera, renderer;
        let playerGroup, groundGroup, shieldMesh, houseGroup;
        let obstacles = [];
        let items = [];
        let debrisParticles = []; // 爆発の破片用
        
        // ゲームの状態
        let isGameOver = false;
        let distance = 0;
        let speed = 0.8; 
        let life = 3;
        let hasShield = false;
        let invincibleTimer = 0; 
        
        let difficultyLevel = 1;
        let nextDifficultyDist = 500;
        let spawnInterval = 50; 
        let frameCount = 0;
        
        // 地面のテクスチャアニメーション用
        let gridHelper;

        // 入力 (ジャンプを thrust として扱う)
        const input = { left: false, right: false, thrust: false };
        let isGrounded = true; // ジャンプ制御用

        window.onload = function() {
            initThreeJS();
            createEnvironment();
            createPlayer();
            setupInputs();
            
            animate();
        };

        function initThreeJS() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // 青空
            // 砂埃のようなフォグ
            scene.fog = new THREE.FogExp2(0xedc9af, 0.004); 

            // カメラを少し見下ろす位置に
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 8, 20);
            camera.lookAt(0, 0, -30);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio); 
            // 影を有効化してリアルにする
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffeedd, 0.5);
            scene.add(ambientLight);
            
            // 太陽の光（影を落とす）
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(20, 30, 10);
            dirLight.castShadow = true;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 150;
            dirLight.shadow.camera.left = -50;
            dirLight.shadow.camera.right = 50;
            dirLight.shadow.camera.top = 50;
            dirLight.shadow.camera.bottom = -50;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function createEnvironment() {
            groundGroup = new THREE.Group();
            scene.add(groundGroup);

            // 砂漠の地面
            const planeGeo = new THREE.PlaneGeometry(2000, 2000);
            const planeMat = new THREE.MeshStandardMaterial({ 
                color: 0xedc9af, // 砂色
                roughness: 1,
                metalness: 0.1
            });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.receiveShadow = true; // 影を受ける
            groundGroup.add(plane);

            // スピード感を出すための流れるグリッド
            gridHelper = new THREE.GridHelper(1000, 100, 0xc2a68f, 0xc2a68f);
            gridHelper.position.y = 0.01;
            groundGroup.add(gridHelper);

            // スタート地点の家を生成
            createHouse();
        }

        function createHouse() {
            houseGroup = new THREE.Group();
            houseGroup.position.set(0, 0, 8); // プレイヤーの少し奥に配置
            scene.add(houseGroup);

            const wallMat = new THREE.MeshStandardMaterial({ color: 0xffeedd, roughness: 0.9 });
            const roofMat = new THREE.MeshStandardMaterial({ color: 0xaa4433, roughness: 0.7 });

            // ガレージ本体
            const houseBody = new THREE.Mesh(new THREE.BoxGeometry(12, 6, 8), wallMat);
            houseBody.position.y = 3;
            houseBody.castShadow = true;
            houseBody.receiveShadow = true;
            houseGroup.add(houseBody);

            // ガレージの屋根（プレイヤーの上あたり）
            const garageRoof = new THREE.Mesh(new THREE.BoxGeometry(14, 1, 10), roofMat);
            garageRoof.position.set(0, 6.5, 4);
            garageRoof.castShadow = true;
            houseGroup.add(garageRoof);

            // 柱
            const pillar1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 0.5), wallMat);
            pillar1.position.set(-6, 3, 8);
            pillar1.castShadow = true;
            houseGroup.add(pillar1);
            
            const pillar2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 0.5), wallMat);
            pillar2.position.set(6, 3, 8);
            pillar2.castShadow = true;
            houseGroup.add(pillar2);
        }

        function createPlayer() {
            playerGroup = new THREE.Group();
            // 車の初期高さ（地面の上）
            playerGroup.position.y = 1;
            scene.add(playerGroup);

            // 車体（バギー風）
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff3300, roughness: 0.4 });
            const blackMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
            const glassMat = new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.1 });

            // メインボディ
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.8, 4), bodyMat);
            body.position.y = 0.5;
            body.castShadow = true;
            playerGroup.add(body);

            // 運転席キャビン
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.8, 2), glassMat);
            cabin.position.set(0, 1.3, -0.5);
            cabin.castShadow = true;
            playerGroup.add(cabin);
            
            // ロールバー風の装飾
            const roof = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.1, 2.2), blackMat);
            roof.position.set(0, 1.7, -0.5);
            roof.castShadow = true;
            playerGroup.add(roof);

            // タイヤを作成するヘルパー関数
            function createTire(x, z) {
                const tire = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.4, 16), blackMat);
                tire.rotation.z = Math.PI / 2;
                tire.position.set(x, 0.2, z);
                tire.castShadow = true;
                playerGroup.add(tire);
                return tire;
            }

            // 4つのタイヤ
            createTire(1.4, 1.2);
            createTire(-1.4, 1.2);
            createTire(1.4, -1.2);
            createTire(-1.4, -1.2);

            // バンパーガード（シールド）
            const shieldGeo = new THREE.BoxGeometry(3, 1.5, 4.5);
            const shieldMat = new THREE.MeshBasicMaterial({
                color: 0x00aaff, // サボテンと区別しやすいネオンブルー
                transparent: true,
                opacity: 0.6,
                wireframe: true
            });
            shieldMesh = new THREE.Mesh(shieldGeo, shieldMat);
            shieldMesh.position.y = 0.5;
            shieldMesh.visible = false;
            playerGroup.add(shieldMesh);

            // 物理挙動用
            playerGroup.userData = { vy: 0, tiltX: 0, tiltZ: 0 };
        }

        function setupInputs() {
            window.addEventListener('keydown', (e) => {
                if(e.code === 'ArrowLeft' || e.code === 'KeyA') input.left = true;
                if(e.code === 'ArrowRight' || e.code === 'KeyD') input.right = true;
                if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') input.thrust = true;
            });
            window.addEventListener('keyup', (e) => {
                if(e.code === 'ArrowLeft' || e.code === 'KeyA') input.left = false;
                if(e.code === 'ArrowRight' || e.code === 'KeyD') input.right = false;
                if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') input.thrust = false;
            });

            const bindButton = (id, key) => {
                const btn = document.getElementById(id);
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); input[key] = true; btn.classList.add('active'); }, {passive: false});
                btn.addEventListener('touchend', (e) => { e.preventDefault(); input[key] = false; btn.classList.remove('active'); }, {passive: false});
                btn.addEventListener('mousedown', (e) => { input[key] = true; btn.classList.add('active'); });
                btn.addEventListener('mouseup', (e) => { input[key] = false; btn.classList.remove('active'); });
                btn.addEventListener('mouseleave', (e) => { input[key] = false; btn.classList.remove('active'); });
            };

            bindButton('btn-left', 'left');
            bindButton('btn-right', 'right');
            bindButton('btn-thrust', 'thrust');
        }

        function spawnObstacle() {
            // 岩かサボテンをランダムで生成
            const isRock = Math.random() > 0.4;
            let mesh;
            
            if (isRock) {
                // 岩
                const size = Math.random() * 1.5 + 1;
                const geo = new THREE.DodecahedronGeometry(size);
                const mat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 1 }); // 茶色
                mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = size - 0.5; // 地面にめり込まないように
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.userData = { isObstacle: true, radius: size };
            } else {
                // サボテン
                const height = Math.random() * 3 + 2;
                const geo = new THREE.CylinderGeometry(0.5, 0.5, height, 8);
                const mat = new THREE.MeshStandardMaterial({ color: 0x228b22, roughness: 0.8 }); // 緑
                mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = height / 2;
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                // サボテンの腕
                const armGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.5, 8);
                const arm1 = new THREE.Mesh(armGeo, mat);
                arm1.position.set(0.6, height*0.2, 0);
                arm1.rotation.z = Math.PI/4;
                arm1.castShadow = true;
                mesh.add(arm1);
                
                mesh.userData = { isObstacle: true, radius: 1.0 };
            }
            
            mesh.position.x = (Math.random() - 0.5) * 40;
            mesh.position.z = -400;
            
            scene.add(mesh);
            obstacles.push(mesh);
        }

        function spawnItem() {
            // アイテム（バンパーガード）
            const geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x00aaff, // ネオンブルー
                metalness: 0.5, 
                roughness: 0.2,
                emissive: 0x004488 // 少し発光させる
            });
            const mesh = new THREE.Mesh(geo, mat);
            
            mesh.position.set((Math.random() - 0.5) * 30, 1.5, -400);
            mesh.castShadow = true;
            scene.add(mesh);
            items.push(mesh);
        }

        function checkDifficulty() {
            if (distance > nextDifficultyDist) {
                difficultyLevel++;
                nextDifficultyDist += 500;
                
                speed += 0.15; // スピードアップ
                spawnInterval = Math.max(10, spawnInterval - 8);
                
                const levelUpUI = document.getElementById('level-up');
                levelUpUI.style.opacity = 1;
                setTimeout(() => { levelUpUI.style.opacity = 0; }, 2000);
            }
        }

        function updatePlayer() {
            // ハンドル操作（左右移動）
            if (input.left && playerGroup.position.x > -18) playerGroup.position.x -= 0.5;
            if (input.right && playerGroup.position.x < 18) playerGroup.position.x += 0.5;

            // ジャンプ処理
            if (input.thrust && isGrounded) {
                playerGroup.userData.vy = 0.6; // ジャンプ力
                isGrounded = false;
            }

            // 重力
            if (!isGrounded) {
                playerGroup.userData.vy -= 0.03; // 重力加速度
                playerGroup.position.y += playerGroup.userData.vy;

                // 着地判定
                if (playerGroup.position.y <= 1) {
                    playerGroup.position.y = 1;
                    playerGroup.userData.vy = 0;
                    isGrounded = true;
                    // 着地時のバウンド演出
                    playerGroup.userData.tiltX = 0.1;
                }
            }

            // 車体の傾き（サスペンション風）
            const targetTiltZ = -playerGroup.position.x * 0.02;
            playerGroup.rotation.z += (targetTiltZ - playerGroup.rotation.z) * 0.1;
            
            if(playerGroup.userData.tiltX > 0) {
                playerGroup.rotation.x = playerGroup.userData.tiltX;
                playerGroup.userData.tiltX -= 0.01;
            } else {
                playerGroup.rotation.x = isGrounded ? 0 : -0.1; // ジャンプ中は少し上を向く
            }

            // 無敵点滅
            if (invincibleTimer > 0) {
                invincibleTimer--;
                playerGroup.visible = (invincibleTimer % 10 < 5); 
            } else {
                playerGroup.visible = true;
            }
        }

        function handleCollisions() {
            const playerRadius = 1.5; // バギーの大まかな当たり判定

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                
                // 距離判定 (X, Zの平面距離と、Yの高さも考慮)
                const dx = obs.position.x - playerGroup.position.x;
                const dz = obs.position.z - playerGroup.position.z;
                const dy = Math.abs(obs.position.y - playerGroup.position.y);
                const dist2D = Math.sqrt(dx*dx + dz*dz);
                
                const hitDist = playerRadius + obs.userData.radius;

                // 2D距離が近く、かつ高度が当たっている場合
                if (dist2D < hitDist && dy < obs.userData.radius + 1.0) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);

                    if (invincibleTimer > 0) continue;

                    if (hasShield) {
                        hasShield = false;
                        shieldMesh.visible = false;
                        document.getElementById('shield-display').style.color = '#aaa';
                        document.getElementById('shield-display').innerText = 'バンパーガード: なし';
                        invincibleTimer = 60; 
                    } else {
                        // ダメージ処理
                        life--;
                        updateLifeUI();
                        if (life <= 0) {
                            // ライフ0で一撃クラッシュ（バラバラになるエフェクト）
                            createExplosion(playerGroup.position);
                            playerGroup.visible = false; // 車体を隠す
                            triggerGameOver();
                            return;
                        } else {
                            invincibleTimer = 90; // 少し長めに無敵時間
                            // 画面を赤くフラッシュさせる
                            const flash = document.createElement('div');
                            flash.style.position = 'absolute';
                            flash.style.top = '0'; flash.style.left = '0';
                            flash.style.width = '100%'; flash.style.height = '100%';
                            flash.style.backgroundColor = 'rgba(255, 0, 0, 0.5)';
                            flash.style.zIndex = '50';
                            flash.style.pointerEvents = 'none';
                            document.body.appendChild(flash);
                            setTimeout(() => document.body.removeChild(flash), 100);
                        }
                    }
                }
            }

            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                const dx = item.position.x - playerGroup.position.x;
                const dz = item.position.z - playerGroup.position.z;
                const dist2D = Math.sqrt(dx*dx + dz*dz);

                if (dist2D < playerRadius + 1.5 && Math.abs(item.position.y - playerGroup.position.y) < 2) {
                    scene.remove(item);
                    items.splice(i, 1);
                    if (!hasShield) {
                        hasShield = true;
                        shieldMesh.visible = true;
                        document.getElementById('shield-display').style.color = '#00aaff';
                        document.getElementById('shield-display').className = 'info highlight';
                        document.getElementById('shield-display').innerText = 'バンパーガード: 装着！';
                    }
                }
            }
        }

        function createExplosion(position) {
            // 車体が砕け散る破片エフェクトを生成
            const particleCount = 15;
            const mat = new THREE.MeshStandardMaterial({ color: 0xff3300, roughness: 0.5 });
            const blackMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            
            for (let i = 0; i < particleCount; i++) {
                const isTire = i % 4 === 0;
                const geo = isTire ? new THREE.CylinderGeometry(0.5, 0.5, 0.3) : new THREE.BoxGeometry(0.8, 0.8, 0.8);
                const mesh = new THREE.Mesh(geo, isTire ? blackMat : mat);
                
                mesh.position.copy(position);
                mesh.position.y += Math.random() * 2;
                mesh.position.x += (Math.random() - 0.5) * 2;
                
                // 飛び散る速度を設定
                mesh.userData = {
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: Math.random() * 1.5 + 0.5,
                    vz: (Math.random() - 0.5) * 1.5 - speed, // 前に投げ出される
                    rx: Math.random() * 0.4,
                    rz: Math.random() * 0.4
                };
                
                mesh.castShadow = true;
                scene.add(mesh);
                debrisParticles.push(mesh);
            }
        }

        function updateLifeUI() {
            let wrenches = "";
            for(let i=0; i<3; i++) {
                wrenches += (i < life) ? "🔧" : "⬛";
            }
            document.getElementById('life-display').innerText = `ライフ: ${wrenches}`;
        }

        function triggerGameOver() {
            isGameOver = true;
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = `走破距離: ${Math.floor(distance)} m`;
            
            // クラッシュ時の赤いフラッシュ演出
            const flash = document.createElement('div');
            flash.style.position = 'absolute';
            flash.style.top = '0'; flash.style.left = '0';
            flash.style.width = '100%'; flash.style.height = '100%';
            flash.style.backgroundColor = 'rgba(255, 0, 0, 0.7)';
            flash.style.zIndex = '50';
            flash.style.pointerEvents = 'none';
            document.body.appendChild(flash);
            
            let opacity = 0.7;
            const fade = setInterval(() => {
                opacity -= 0.05;
                flash.style.backgroundColor = `rgba(255, 0, 0, ${opacity})`;
                if (opacity <= 0) {
                    clearInterval(fade);
                    document.body.removeChild(flash);
                }
            }, 50);
        }

        function animate() {
            requestAnimationFrame(animate);

            // 破片の物理更新（ゲームオーバー後もアニメーションさせる）
            if (isGameOver) {
                for (let i = 0; i < debrisParticles.length; i++) {
                    const p = debrisParticles[i];
                    p.position.x += p.userData.vx;
                    p.position.y += p.userData.vy;
                    p.position.z += p.userData.vz;
                    p.rotation.x += p.userData.rx;
                    p.rotation.z += p.userData.rz;
                    p.userData.vy -= 0.03; // 重力で落ちる
                }
                renderer.render(scene, camera);
                return; // ここで通常ゲームの更新を止める
            }

            frameCount++;
            const currentTime = performance.now();
            
            distance += speed;
            document.getElementById('dist-display').innerText = `走破距離: ${Math.floor(distance)} m`;

            // 地面のテクスチャを流す（スピード感）
            gridHelper.position.z += speed * 2;
            if (gridHelper.position.z > 100) {
                gridHelper.position.z -= 100; // ループ
            }

            // スタート地点の家を後ろに流す
            if (houseGroup) {
                houseGroup.position.z += speed * 2;
            }

            checkDifficulty();
            updatePlayer();

            if (frameCount % spawnInterval === 0) spawnObstacle();
            if (frameCount % 400 === 0) spawnItem();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.position.z += speed * 2; 

                if (obs.position.z > 20) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                }
            }

            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.position.z += speed * 2;
                item.rotation.x += 0.05;
                item.rotation.y += 0.05;

                if (item.position.z > 20) {
                    scene.remove(item);
                    items.splice(i, 1);
                }
            }

            handleCollisions();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
