<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>砂漠のオフロード・サバイバル</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87ceeb; /* 青空色に変更 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
        }
        .info {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .highlight {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        /* ゲームオーバー画面 */
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            z-index: 30;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            color: #ff3333;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ff0000;
        }
        #final-score {
            font-size: 32px;
            margin-bottom: 10px;
        }
        button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff5500, #ffaa00);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 170, 0, 0.5);
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.95);
        }

        /* モバイル向けコントロールUI */
        #controls {
            display: none; /* デフォルトは非表示。JSでタッチデバイスか判定して表示する */
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px;
            height: 100px;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 20;
        }
        .control-group {
            display: flex;
            gap: 20px;
        }
        .btn {
            width: 80px;
            height: 80px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 30px;
            user-select: none;
            -webkit-user-select: none;
            backdrop-filter: blur(5px);
        }
        .btn:active, .btn.active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.95);
            color: #000;
        }
        #btn-thrust {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            background: rgba(255, 170, 0, 0.6);
            border-color: #ffaa00;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
            flex-direction: column;
        }
        #btn-thrust:active, #btn-thrust.active {
            background: rgba(255, 136, 0, 1);
        }
        
        #level-up {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff3300;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 20px #ffff00;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 15;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- UI表示 -->
    <div id="ui-layer">
        <div class="info" id="dist-display">走破距離: 0 m</div>
        <div class="info" id="life-display">ライフ: 🔧🔧🔧</div>
        <div class="info" id="shield-display" style="color: #aaa;">バンパーガード: なし</div>
    </div>

    <!-- レベルアップ通知 -->
    <div id="level-up">ZONE クリア！ルート悪化！</div>

    <!-- コントローラー -->
    <div id="controls">
        <div class="control-group">
            <div class="btn" id="btn-left">◀</div>
            <div class="btn" id="btn-right">▶</div>
        </div>
        <div class="btn" id="btn-thrust">🚀<br>JUMP</div>
    </div>

    <!-- ゲームオーバー画面 -->
    <div id="game-over-screen">
        <h1>CRASHED</h1>
        <div id="final-score">走破距離: 0 m</div>
        <button onclick="location.reload()">再スタート</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // === グローバル変数 ===
        let scene, camera, renderer;
        let playerGroup, ground, shieldMesh, houseGroup;
        let obstacles = [];
        let items = [];
        let debrisParticles = []; // 破壊エフェクト用
        
        // ゲームの状態
        let isGameOver = false;
        let distance = 0;
        let speed = 0.8; 
        let life = 3;
        let hasShield = false;
        let invincibleTimer = 0; 
        
        let difficultyLevel = 1;
        let nextDifficultyDist = 500;
        let spawnInterval = 40; 
        let frameCount = 0;

        // 入力 (ジャンプを thrust として扱う)
        const input = { left: false, right: false, thrust: false };
        let isGrounded = true; // ジャンプ制御用

        window.onload = function() {
            // タッチデバイスかどうかを判定し、スマホならコントローラーを表示
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                document.getElementById('controls').style.display = 'flex';
            }

            initThreeJS();
            createEnvironment();
            createPlayer();
            setupInputs();
            
            animate();
        };

        function initThreeJS() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // 背景を青空に設定
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.005); // 霧（遠景）の色も青空に合わせる

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 6, 20);
            camera.lookAt(0, 0, -50);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio); 
            renderer.shadowMap.enabled = true; // 影を有効化
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // 環境光
            const ambientLight = new THREE.AmbientLight(0xffeedd, 0.6);
            scene.add(ambientLight);
            
            // 太陽光（影を作る）
            const dirLight = new THREE.DirectionalLight(0xffeedd, 1);
            dirLight.position.set(50, 100, 50);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 500;
            dirLight.shadow.camera.left = -50;
            dirLight.shadow.camera.right = 50;
            dirLight.shadow.camera.top = 50;
            dirLight.shadow.camera.bottom = -50;
            scene.add(dirLight);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function createEnvironment() {
            // 地面（砂漠）
            const groundGeo = new THREE.PlaneGeometry(200, 1000);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0xdd8833, roughness: 1 });
            ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -1; // プレイヤーの基準より少し下
            ground.receiveShadow = true;
            scene.add(ground);

            // スタート地点の家（ガレージ風）
            houseGroup = new THREE.Group();
            houseGroup.position.set(0, 0, -5); // プレイヤーを覆うように配置
            scene.add(houseGroup);

            // 家の土台
            const baseGeo = new THREE.BoxGeometry(20, 1, 20);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = -0.5;
            base.receiveShadow = true;
            houseGroup.add(base);

            // 柱
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0x884422 });
            const p1 = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 1), pillarMat); p1.position.set(-8, 4, -8); p1.castShadow = true; houseGroup.add(p1);
            const p2 = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 1), pillarMat); p2.position.set(8, 4, -8); p2.castShadow = true; houseGroup.add(p2);
            const p3 = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 1), pillarMat); p3.position.set(-8, 4, 8); p3.castShadow = true; houseGroup.add(p3);
            const p4 = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 1), pillarMat); p4.position.set(8, 4, 8); p4.castShadow = true; houseGroup.add(p4);

            // 屋根
            const roofGeo = new THREE.BoxGeometry(22, 1, 22);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x993333 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = 9.5;
            roof.castShadow = true;
            houseGroup.add(roof);
        }

        function createPlayer() {
            playerGroup = new THREE.Group();
            scene.add(playerGroup);

            // バギーのボディ
            const bodyGeo = new THREE.BoxGeometry(3, 1.5, 4);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff3300, roughness: 0.4 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 1;
            body.castShadow = true;
            playerGroup.add(body);

            // 運転席（黒い箱）
            const cabinGeo = new THREE.BoxGeometry(2, 1, 2);
            const cabinMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const cabin = new THREE.Mesh(cabinGeo, cabinMat);
            cabin.position.set(0, 2.2, -0.5);
            cabin.castShadow = true;
            playerGroup.add(cabin);

            // タイヤ
            const tireGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.5, 16);
            const tireMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            
            const tireFL = new THREE.Mesh(tireGeo, tireMat); tireFL.rotation.z = Math.PI/2; tireFL.position.set(-1.8, 0.5, -1.5); tireFL.castShadow = true; playerGroup.add(tireFL);
            const tireFR = new THREE.Mesh(tireGeo, tireMat); tireFR.rotation.z = Math.PI/2; tireFR.position.set(1.8, 0.5, -1.5); tireFR.castShadow = true; playerGroup.add(tireFR);
            const tireBL = new THREE.Mesh(tireGeo, tireMat); tireBL.rotation.z = Math.PI/2; tireBL.position.set(-1.8, 0.5, 1.5); tireBL.castShadow = true; playerGroup.add(tireBL);
            const tireBR = new THREE.Mesh(tireGeo, tireMat); tireBR.rotation.z = Math.PI/2; tireBR.position.set(1.8, 0.5, 1.5); tireBR.castShadow = true; playerGroup.add(tireBR);

            // バンパーガード（シールド）- 青く光る
            const shieldGeo = new THREE.BoxGeometry(3.5, 1, 0.5);
            const shieldMat = new THREE.MeshBasicMaterial({ color: 0x00aaff, wireframe: false, transparent: true, opacity: 0.8 });
            shieldMesh = new THREE.Mesh(shieldGeo, shieldMat);
            shieldMesh.position.set(0, 1, -2.2);
            shieldMesh.visible = false;
            playerGroup.add(shieldMesh);

            playerGroup.userData = { vy: 0 };
        }

        function setupInputs() {
            window.addEventListener('keydown', (e) => {
                if(e.code === 'ArrowLeft' || e.code === 'KeyA') input.left = true;
                if(e.code === 'ArrowRight' || e.code === 'KeyD') input.right = true;
                if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') input.thrust = true;
            });
            window.addEventListener('keyup', (e) => {
                if(e.code === 'ArrowLeft' || e.code === 'KeyA') input.left = false;
                if(e.code === 'ArrowRight' || e.code === 'KeyD') input.right = false;
                if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') input.thrust = false;
            });

            const bindButton = (id, key) => {
                const btn = document.getElementById(id);
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); input[key] = true; btn.classList.add('active'); }, {passive: false});
                btn.addEventListener('touchend', (e) => { e.preventDefault(); input[key] = false; btn.classList.remove('active'); }, {passive: false});
                btn.addEventListener('mousedown', (e) => { input[key] = true; btn.classList.add('active'); });
                btn.addEventListener('mouseup', (e) => { input[key] = false; btn.classList.remove('active'); });
                btn.addEventListener('mouseleave', (e) => { input[key] = false; btn.classList.remove('active'); });
            };

            bindButton('btn-left', 'left');
            bindButton('btn-right', 'right');
            bindButton('btn-thrust', 'thrust');
        }

        function spawnObstacle() {
            // 岩かサボテンをランダムで生成
            const isRock = Math.random() > 0.4;
            let mesh;

            if (isRock) {
                const size = Math.random() * 2 + 1;
                const geo = new THREE.DodecahedronGeometry(size);
                const mat = new THREE.MeshStandardMaterial({ color: 0x887766, roughness: 1 });
                mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = size - 1; // 地面に接するように
                mesh.userData.type = 'rock';
                mesh.userData.radius = size;
            } else {
                // サボテン（円柱の組み合わせ）
                const geo = new THREE.CylinderGeometry(0.5, 0.5, 4);
                const mat = new THREE.MeshStandardMaterial({ color: 0x228822, roughness: 0.8 });
                mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = 1;
                mesh.userData.type = 'cactus';
                mesh.userData.radius = 0.5;
                // 腕をつける
                const armGeo = new THREE.CylinderGeometry(0.4, 0.4, 2);
                const arm1 = new THREE.Mesh(armGeo, mat); arm1.rotation.z = Math.PI/2; arm1.position.set(-1, 0.5, 0); mesh.add(arm1);
                const arm2 = new THREE.Mesh(armGeo, mat); arm2.rotation.z = Math.PI/2; arm2.position.set(1, 1.5, 0); mesh.add(arm2);
            }
            
            mesh.position.x = (Math.random() - 0.5) * 40;
            mesh.position.z = -400;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            scene.add(mesh);
            obstacles.push(mesh);
        }

        function spawnItem() {
            // バンパーガード（青い箱）
            const geo = new THREE.BoxGeometry(2, 2, 2);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true });
            const mesh = new THREE.Mesh(geo, mat);
            
            mesh.position.x = (Math.random() - 0.5) * 30;
            mesh.position.y = 0.5;
            mesh.position.z = -400;
            
            scene.add(mesh);
            items.push(mesh);
        }

        function checkDifficulty() {
            if (distance > nextDifficultyDist) {
                difficultyLevel++;
                nextDifficultyDist += 500;
                
                speed += 0.15; // スピードアップ
                spawnInterval = Math.max(10, spawnInterval - 8);
                
                const levelUpUI = document.getElementById('level-up');
                levelUpUI.style.opacity = 1;
                setTimeout(() => { levelUpUI.style.opacity = 0; }, 2000);
            }
        }

        function updatePlayer() {
            // 左右移動
            if (input.left && playerGroup.position.x > -20) playerGroup.position.x -= 0.6;
            if (input.right && playerGroup.position.x < 20) playerGroup.position.x += 0.6;

            // ジャンプ処理（接地している時だけジャンプ可能）
            if (input.thrust && isGrounded) {
                playerGroup.userData.vy = 0.6; // ジャンプ力
                isGrounded = false;
            }

            // 重力
            if (!isGrounded) {
                playerGroup.userData.vy -= 0.03; // 重力
                playerGroup.position.y += playerGroup.userData.vy;

                // 着地判定
                if (playerGroup.position.y <= 0) {
                    playerGroup.position.y = 0;
                    playerGroup.userData.vy = 0;
                    isGrounded = true;
                }
            }

            // 車体の傾き（コーナリング風）
            playerGroup.rotation.z = -playerGroup.position.x * 0.02;

            // 無敵時間の点滅処理
            if (invincibleTimer > 0) {
                invincibleTimer--;
                playerGroup.visible = (invincibleTimer % 10 < 5);
            } else if (!isGameOver) {
                playerGroup.visible = true;
            }

            // アイテムの回転アニメーション
            items.forEach(item => {
                item.rotation.x += 0.05;
                item.rotation.y += 0.05;
            });
        }

        function handleCollisions() {
            const playerRadius = 2.0;

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                
                // 2D平面(XZ)での距離と、Y軸（高さ）の判定を組み合わせる
                const dx = playerGroup.position.x - obs.position.x;
                const dz = playerGroup.position.z - obs.position.z;
                const dist2D = Math.sqrt(dx*dx + dz*dz);
                
                let hitHeight = false;
                if (obs.userData.type === 'rock') {
                     hitHeight = playerGroup.position.y < obs.position.y + obs.userData.radius;
                } else {
                     hitHeight = playerGroup.position.y < 3; // サボテンの高さ
                }

                const hitRadius = playerRadius + obs.userData.radius;

                if (dist2D < hitRadius && hitHeight) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);

                    if (invincibleTimer > 0) continue;

                    if (hasShield) {
                        hasShield = false;
                        shieldMesh.visible = false;
                        document.getElementById('shield-display').style.color = '#aaa';
                        document.getElementById('shield-display').innerText = 'バンパーガード: なし';
                        invincibleTimer = 60; 
                    } else {
                        // ダメージ処理
                        life--;
                        updateLifeUI();
                        if (life <= 0) {
                            // ライフ0で一撃クラッシュ（バラバラになるエフェクト）
                            createExplosion(playerGroup.position);
                            playerGroup.visible = false; // 車体を隠す
                            triggerGameOver();
                            return;
                        } else {
                            invincibleTimer = 90; // 少し長めに無敵時間
                            // 画面を赤くフラッシュさせる
                            const flash = document.createElement('div');
                            flash.style.position = 'absolute';
                            flash.style.top = '0'; flash.style.left = '0';
                            flash.style.width = '100%'; flash.style.height = '100%';
                            flash.style.backgroundColor = 'rgba(255, 0, 0, 0.5)';
                            flash.style.zIndex = '50';
                            flash.style.pointerEvents = 'none';
                            document.body.appendChild(flash);
                            setTimeout(() => document.body.removeChild(flash), 100);
                        }
                    }
                }
            }

            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                const dx = playerGroup.position.x - item.position.x;
                const dz = playerGroup.position.z - item.position.z;
                const dist2D = Math.sqrt(dx*dx + dz*dz);
                
                if (dist2D < playerRadius + 1.5 && Math.abs(item.position.y - playerGroup.position.y) < 2) {
                    scene.remove(item);
                    items.splice(i, 1);
                    if (!hasShield) {
                        hasShield = true;
                        shieldMesh.visible = true;
                        document.getElementById('shield-display').style.color = '#00aaff';
                        document.getElementById('shield-display').className = 'info highlight';
                        document.getElementById('shield-display').innerText = 'バンパーガード: 装着！';
                    }
                }
            }
        }

        function createExplosion(position) {
            // 車の破片を生成
            const colors = [0xff3300, 0x222222, 0x555555];
            for (let i = 0; i < 20; i++) {
                const geo = new THREE.BoxGeometry(0.5 + Math.random(), 0.5 + Math.random(), 0.5 + Math.random());
                const mat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random()*colors.length)] });
                const mesh = new THREE.Mesh(geo, mat);
                
                mesh.position.copy(position);
                mesh.position.y += Math.random() * 2;
                
                // 吹き飛ぶ方向と速度
                mesh.userData = {
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: Math.random() * 1.5 + 0.5,
                    vz: (Math.random() - 0.5) * 1.5 - speed,
                    rx: Math.random() * 0.2,
                    ry: Math.random() * 0.2
                };
                
                mesh.castShadow = true;
                scene.add(mesh);
                debrisParticles.push(mesh);
            }
        }

        function updateLifeUI() {
            let wrenches = "";
            for(let i=0; i<3; i++) {
                wrenches += (i < life) ? "🔧" : "⬛";
            }
            document.getElementById('life-display').innerText = `ライフ: ${wrenches}`;
        }

        function triggerGameOver() {
            isGameOver = true;
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = `走破距離: ${Math.floor(distance)} m`;
            
            // クラッシュ時の赤いフラッシュ演出
            const flash = document.createElement('div');
            flash.style.position = 'absolute';
            flash.style.top = '0'; flash.style.left = '0';
            flash.style.width = '100%'; flash.style.height = '100%';
            flash.style.backgroundColor = 'rgba(255, 0, 0, 0.8)';
            flash.style.zIndex = '50';
            flash.style.pointerEvents = 'none';
            document.body.appendChild(flash);
            
            let opacity = 0.8;
            const fade = setInterval(() => {
                opacity -= 0.05;
                flash.style.backgroundColor = `rgba(255, 0, 0, ${opacity})`;
                if (opacity <= 0) {
                    clearInterval(fade);
                    document.body.removeChild(flash);
                }
            }, 50);
        }

        function animate() {
            requestAnimationFrame(animate);

            // 破片のアニメーション（ゲームオーバー時も動かし続ける）
            for (let i = debrisParticles.length - 1; i >= 0; i--) {
                const p = debrisParticles[i];
                p.position.x += p.userData.vx;
                p.position.y += p.userData.vy;
                p.position.z += p.userData.vz;
                p.rotation.x += p.userData.rx;
                p.rotation.y += p.userData.ry;
                p.userData.vy -= 0.05; // 破片の重力

                if (p.position.y < -2) {
                    scene.remove(p);
                    debrisParticles.splice(i, 1);
                }
            }

            if (isGameOver) {
                renderer.render(scene, camera);
                return;
            }

            frameCount++;
            distance += speed;
            document.getElementById('dist-display').innerText = `走破距離: ${Math.floor(distance)} m`;

            // 地面のテクスチャスクロール（簡易的に地面を動かさず、車が進んでいるように見せるため模様を動かすのが一般的だが、今回は単色なので省略）

            // スタート地点の家を後ろに流す
            if (houseGroup) {
                houseGroup.position.z += speed * 2;
            }

            checkDifficulty();
            updatePlayer();

            if (frameCount % spawnInterval === 0) spawnObstacle();
            if (frameCount % 400 === 0) spawnItem();

            // 障害物とアイテムの移動
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.position.z += speed * 2.5; 
                if (obs.position.z > 20) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                }
            }

            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.position.z += speed * 2.5;
                if (item.position.z > 20) {
                    scene.remove(item);
                    items.splice(i, 1);
                }
            }

            handleCollisions();

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
